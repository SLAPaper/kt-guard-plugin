name: kt-guard-plugin
version: "0.2.1"
description: "Message role guard plugin for KohakuTerrarium"
author: "SLAPaper"
repository: "https://github.com/SLAPaper/kt-guard-plugin"

plugins:
  - name: message_role_guard
    module: kt_guard_plugin.plugins.guard
    class: MessageRoleGuardPlugin
    description: "Ensures system messages are placed at position 0 in the LLM conversation. Detects and fixes invalid message ordering that can break OpenAI-compatible API calls."
  - name: message_context_logger
    module: kt_guard_plugin.plugins.message_context_logger
    class: MessageContextLoggerPlugin
    description: "Writes full LLM message context, tools, responses, and usage to rotating JSONL logs for runtime debugging."
